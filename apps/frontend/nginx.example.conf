# Пример nginx-конфига для VibeVox SPA с локализованными prerendered страницами.
# Положи в /etc/nginx/sites-enabled/vibevox.conf и подставь свой server_name + ssl.

server {
  listen 443 ssl http2;
  server_name vibevox.app www.vibevox.app;

  # ssl_certificate /etc/letsencrypt/live/vibevox.app/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/vibevox.app/privkey.pem;

  # Монорепо: фронт собирается в apps/frontend/dist (npm run build:full).
  root /var/www/vibevox/apps/frontend/dist;
  index index.html;

  # ─── gzip / brotli ─────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml;
  gzip_min_length 256;

  # ─── Cache-Control ─────────────────────────────────────────────────────────

  # Хешированные ассеты (имена с hash) — кэшируем навсегда
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Картинки / шрифты
  location ~* \.(png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Локали — обновляются раз в сутки + stale-while-revalidate
  location /locales/ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
    add_header Content-Type "application/json; charset=utf-8";
    try_files $uri =404;
  }

  # sitemap.xml — короткий cache (1 час), пересоздаётся на каждый build
  location = /sitemap.xml {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    add_header Content-Type "application/xml; charset=utf-8";
    try_files $uri =404;
  }

  location = /robots.txt {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    add_header Content-Type "text/plain; charset=utf-8";
    try_files $uri =404;
  }

  # HTML файлы — не кэшируем (всегда свежий index)
  location ~ \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # ─── Локализованные prerender-страницы /{lang}/... ─────────────────────────
  #
  # Если URL вида /es/auth/login → отдаём dist/es/auth/login/index.html
  # Если /es/ → dist/es/index.html
  # Иначе → SPA fallback (dist/index.html)

  location ~ ^/(af|am|ar|az|be|bg|bn|bs|ca|ceb|co|cs|cy|da|de|el|en|eo|es|et|eu|fa|fi|fr|fy|ga|gd|gl|gu|ha|haw|he|hi|hmn|hr|ht|hu|hy|id|ig|is|it|ja|jv|ka|kk|km|kn|ko|ku|ky|la|lb|lo|lt|lv|mg|mi|mk|ml|mn|mr|ms|mt|my|ne|nl|no|ny|or|pa|pl|ps|pt|ro|ru|rw|sd|si|sk|sl|sm|sn|so|sq|sr|st|su|sv|sw|ta|te|tg|th|tk|tl|tr|tt|ug|uk|ur|uz|vi|xh|yi|yo|zh|zu)(/.*)?$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    # пробуем prerendered HTML, иначе SPA fallback
    try_files $uri $uri/index.html /$1/index.html /index.html;
  }

  # ─── SPA fallback ──────────────────────────────────────────────────────────
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/index.html /index.html;
  }

  # ─── API проксируем на бэкенд (если на этом же домене) ─────────────────────
  location /api/ {
    proxy_pass http://localhost:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name vibevox.app www.vibevox.app;
  return 301 https://$server_name$request_uri;
}
